name: Build ISO

on:
  workflow_dispatch:
    inputs:
      edition:
        description: "Edition to build"
        required: true
        type: choice
        options:
          - all-de
          - all-wm
          - all
          - xfce
          - plasma
          - gnome
          - cinnamon
          - i3
          - hyprland
          - sway
          - bspwm

permissions:
  contents: write

jobs:
  resolve-matrix:
    runs-on: ubuntu-latest
    outputs:
      editions: ${{ steps.set.outputs.editions }}
    steps:
      - id: set
        run: |
          case "${{ inputs.edition }}" in
            all-de)  echo 'editions=["xfce","plasma","gnome","cinnamon"]' >> "$GITHUB_OUTPUT" ;;
            all-wm)  echo 'editions=["i3","hyprland","sway","bspwm"]' >> "$GITHUB_OUTPUT" ;;
            all)     echo 'editions=["xfce","plasma","gnome","cinnamon","i3","hyprland","sway","bspwm"]' >> "$GITHUB_OUTPUT" ;;
            *)       echo 'editions=["${{ inputs.edition }}"]' >> "$GITHUB_OUTPUT" ;;
          esac

  build:
    needs: resolve-matrix
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    strategy:
      fail-fast: false
      matrix:
        edition: ${{ fromJson(needs.resolve-matrix.outputs.editions) }}
    name: Build ${{ matrix.edition }}

    steps:
      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            archiso git base-devel squashfs-tools dosfstools xorriso \
            mtools erofs-utils

      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          pacman -Scc --noconfirm || true
          df -h /

      - name: Build ISO
        run: |
          edition="${{ matrix.edition }}"
          echo "::group::Building ArchCosta ${edition} edition"

          chmod +x build.sh
          ./build.sh "$edition" \
            --work-dir /tmp/archcosta-build \
            --out-dir "$GITHUB_WORKSPACE/out"

          echo "::endgroup::"

      - name: Generate checksums
        run: |
          cd "$GITHUB_WORKSPACE/out"
          for iso in *.iso; do
            sha256sum "$iso" > "${iso}.sha256"
            echo "### $iso" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat "${iso}.sha256" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: archcosta-${{ matrix.edition }}-iso
          path: |
            out/*.iso
            out/*.sha256
          retention-days: 7
          compression-level: 0

  # Release disabled - ISO size too large for GitHub releases
