title   ArchCosta — Boot (Safe Graphics)
sort-key 03
linux   /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
initrd  /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
options archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G nomodeset quiet splash loglevel=3 vt.global_cursor_default=0 plymouth.theme=archcosta
