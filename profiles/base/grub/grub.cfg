# ArchCosta GRUB Configuration

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod all_video
insmod font

set default="0"
set timeout="10"
set gfxmode="auto"
set gfxpayload="keep"

loadfont "unicode.pf2"

terminal_input console
terminal_output console

menuentry "ArchCosta — Boot Live Session" --class archcosta --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G quiet splash loglevel=3 rd.udev.log_priority=3
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "ArchCosta — Boot (NVIDIA)" --class archcosta --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G nvidia-drm.modeset=1 quiet splash loglevel=3
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "ArchCosta — Boot (Open Source Drivers)" --class archcosta --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G nomodeset quiet splash loglevel=3
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "ArchCosta — Boot to RAM" --class archcosta --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% copytoram quiet splash loglevel=3
    initrd /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
}

menuentry "System — Restart" --class restart {
    echo "Restarting..."
    reboot
}

menuentry "System — Shutdown" --class shutdown {
    echo "Shutting down..."
    halt
}
