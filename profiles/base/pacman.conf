#
# ArchCosta pacman.conf
#

[options]
HoldPkg     = pacman glibc
Architecture = x86_64
Color
CheckSpace
VerbosePkgLists
ParallelDownloads = 10
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

# ArchCosta custom repository
[archcosta]
SigLevel = Optional TrustAll
Server = https://archcosta-os.github.io/archcosta-repo/$arch

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
