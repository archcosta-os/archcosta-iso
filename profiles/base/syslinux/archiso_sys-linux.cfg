LABEL archcosta
TEXT HELP
Boot the ArchCosta live session on BIOS.
ENDTEXT
MENU LABEL ArchCosta — Boot Live Session (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G quiet splash loglevel=3 rd.udev.log_priority=3

LABEL archcosta-nvidia
TEXT HELP
Boot ArchCosta with NVIDIA proprietary driver support.
ENDTEXT
MENU LABEL ArchCosta — Boot (NVIDIA)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G nvidia-drm.modeset=1 quiet splash loglevel=3

LABEL archcosta-nomodeset
TEXT HELP
Boot ArchCosta with safe graphics (no hardware acceleration).
ENDTEXT
MENU LABEL ArchCosta — Boot (Safe Graphics)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G nomodeset loglevel=3

LABEL archcosta-ram
TEXT HELP
Boot ArchCosta entirely into RAM (requires sufficient memory).
ENDTEXT
MENU LABEL ArchCosta — Boot to RAM
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% copytoram quiet splash loglevel=3
