LABEL archcosta
TEXT HELP
Boot the ArchCosta live session on BIOS.
ENDTEXT
MENU LABEL ArchCosta — Boot Live Session (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G quiet splash

LABEL archcosta-nomodeset
TEXT HELP
Boot ArchCosta with safe graphics (no hardware acceleration).
ENDTEXT
MENU LABEL ArchCosta — Boot (Safe Graphics)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=10G nomodeset

LABEL archcosta-ram
TEXT HELP
Boot ArchCosta entirely into RAM (requires sufficient memory).
ENDTEXT
MENU LABEL ArchCosta — Boot to RAM
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% copytoram
