DEFAULT archcosta
PROMPT 0
TIMEOUT 100
UI vesamenu.c32

MENU TITLE ArchCosta Live Boot Menu
MENU RESOLUTION 1024 768
MENU COLOR border       30;44   #40ffffff #a0000000 std
MENU COLOR title        1;36;44 #9033ccff #a0000000 std
MENU COLOR sel          7;37;40 #e0ffffff #20ffffff all
MENU COLOR unsel        37;44   #50ffffff #a0000000 std
MENU COLOR help         37;40   #c0ffffff #a0000000 std
MENU COLOR timeout_msg  37;40   #80ffffff #00000000 std
MENU COLOR timeout      1;37;40 #c0ffffff #00000000 std
MENU COLOR msg07        37;40   #90ffffff #a0000000 std
MENU COLOR tabmsg       31;40   #30ffffff #00000000 std

LABEL archcosta
    MENU LABEL ArchCosta — Boot Live Session
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G quiet splash

LABEL archcosta-nomodeset
    MENU LABEL ArchCosta — Boot (Safe Graphics)
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% cow_spacesize=10G nomodeset

LABEL archcosta-ram
    MENU LABEL ArchCosta — Boot to RAM
    LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% copytoram

LABEL existing
    MENU LABEL Boot Existing OS
    COM32 chain.c32
    APPEND hd0 0

LABEL reboot
    MENU LABEL Restart
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Shutdown
    COM32 poweroff.c32
