[window]
padding = { x = 8, y = 8 }
dynamic_padding = true
opacity = 0.92
decorations = "None"

[scrolling]
history = 10000
multiplier = 3

[font]
size = 10.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style = { shape = "Beam", blinking = "On" }

[mouse]
hide_when_typing = true

[colors.primary]
background = "#1a1a2e"
foreground = "#d3d7cf"

[colors.cursor]
text = "#1a1a2e"
cursor = "#00b4d8"

[colors.vi_mode_cursor]
text = "#1a1a2e"
cursor = "#22b8cf"

[colors.selection]
text = "#ffffff"
background = "#404060"

[colors.normal]
black = "#1a1a2e"
red = "#ff6b6b"
green = "#51cf66"
yellow = "#ffd43b"
blue = "#339af0"
magenta = "#cc5de8"
cyan = "#22b8cf"
white = "#ced4da"

[colors.bright]
black = "#495057"
red = "#ff8787"
green = "#69db7c"
yellow = "#ffe066"
blue = "#5c7cfa"
magenta = "#da77f2"
cyan = "#3bc9db"
white = "#f8f9fa"

[keyboard]
bindings = [
    { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
]
