; ArchCosta Polybar Configuration
; https://github.com/archcosta/archcosta-bspwm

[colors]
background = #1a1a2e
background-alt = #252542
foreground = #e0e0e0
foreground-alt = #888888
primary = #00b4d8
secondary = #22b8cf
alert = #e06c75
success = #98c379
warning = #e5c07b
white = #ffffff

; -----------------------------------------------------------
; Bar
; -----------------------------------------------------------
[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 28pt
radius = 0
dpi = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 0pt
border-color = #00000000

padding-left = 1
padding-right = 2

module-margin-left = 1
module-margin-right = 1

separator = |
separator-foreground = ${colors.foreground-alt}

font-0 = "Noto Sans:size=10;2"
font-1 = "Noto Sans:size=10:weight=bold;2"
font-2 = "Font Awesome 6 Free Solid:size=10;2"
font-3 = "Font Awesome 6 Brands:size=10;2"

modules-left = bspwm xwindow
modules-center = date
modules-right = cpu memory pulseaudio network battery

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = bspwm
override-redirect = false

tray-position = right
tray-detached = false
tray-maxsize = 16
tray-padding = 4
tray-background = ${colors.background}

; -----------------------------------------------------------
; Modules
; -----------------------------------------------------------

[module/bspwm]
type = internal/bspwm

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-foreground = ${colors.primary}
label-focused-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.white}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 3
format-prefix = "MEM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/network]
type = internal/network
interface-type = wireless
interval = 5

format-connected-prefix = "WiFi "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %essid% %signal%%

format-disconnected-prefix = "WiFi "
format-disconnected-prefix-foreground = ${colors.alert}
label-disconnected = disconnected
label-disconnected-foreground = ${colors.foreground-alt}

[module/network-wired]
type = internal/network
interface-type = wired
interval = 5

format-connected-prefix = "ETH "
format-connected-prefix-foreground = ${colors.primary}
label-connected = %local_ip%

format-disconnected = ""

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
label-volume = %percentage%%

format-muted-prefix = "VOL "
format-muted-prefix-foreground = ${colors.alert}
label-muted = muted
label-muted-foreground = ${colors.foreground-alt}

click-right = pavucontrol

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
low-at = 15
poll-interval = 30

format-charging-prefix = "CHG "
format-charging-prefix-foreground = ${colors.success}
label-charging = %percentage%%

format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.primary}
label-discharging = %percentage%%

format-full-prefix = "BAT "
format-full-prefix-foreground = ${colors.success}
label-full = full

format-low-prefix = "BAT "
format-low-prefix-foreground = ${colors.alert}
label-low = %percentage%% (low)

[module/date]
type = internal/date
interval = 30

date = %a, %b %d
time = %H:%M

label = %date%  %time%
label-foreground = ${colors.foreground}

[settings]
screenchange-reload = true
pseudo-transparency = false
