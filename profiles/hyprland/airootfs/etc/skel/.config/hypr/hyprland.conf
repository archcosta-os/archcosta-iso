# ArchCosta Hyprland Configuration
# https://wiki.hyprland.org/Configuring/

# -----------------------------------------------
# Environment Variables
# -----------------------------------------------

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Breeze
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = WAYLAND_DISPLAY,wayland-1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GLFW_USE_WAYLAND,1
env = XDG_DESKTOP_PORTAL_HYPRLAND,1

# -----------------------------------------------
# Monitor Configuration
# -----------------------------------------------

monitor = , preferred, auto, 1

# -----------------------------------------------
# Autostart
# -----------------------------------------------

exec-once = waybar
exec-once = hyprpaper
exec-once = hypridle
exec-once = mako
exec-once = wofi --show drun
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/hyprland/hyprland-autostart || true

# -----------------------------------------------
# General
# -----------------------------------------------

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(00b4d8ee) rgba(22b8cfee) 45deg
    col.inactive_border = rgba(1a1a2eee)
    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = false
    allow_tearing = false
}

# -----------------------------------------------
# Decoration
# -----------------------------------------------

decoration {
    rounding = 8
    
    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0
    
    dim_inactive = true
    dim_strength = 0.08
    
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
        xray = false
        ignore_opacity = true
        contrast = 0.8916
        brightness = 0.8172
        vibrancy = false
    }
    
    drop_shadow = true
    shadow_range = 15
    shadow_render_power = 3
    col.shadow = rgba(1a1a2eaa)
    col.shadow_inactive = rgba(1a1a2a55)
    
    active_hue = 190
    inactive_hue = 190
}

# -----------------------------------------------
# Animations
# -----------------------------------------------

animations {
    enabled = true
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    
    animation = global, 1, 5, overshot
    animation = windows, 1, 5, overshot
    animation = windowsIn, 1, 5, smoothOut, popin 60%
    animation = windowsOut, 1, 4, smoothIn, popout 60%
    animation = windowsMove, 1, 4, easeOutQuint
    animation = border, 1, 10, linear
    animation = borderangle, 1, 20, easeOutQuint, loop
    animation = fade, 1, 7, overshot
    animation = workspaces, 1, 6, overshot
    animation = special, 1, 5, overshot
}

# -----------------------------------------------
# Input
# -----------------------------------------------

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    
    follow_mouse = 1
    sensitivity = 0
    
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        scroll_factor = 0.8
    }
}

# -----------------------------------------------
# Gestures
# -----------------------------------------------

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_create_new = true
    workspace_swipe_cancel_confirm = true
}

# -----------------------------------------------
# Layout
# -----------------------------------------------

dwindle {
    pseudotile = true
    preserve_split = true
    no_gaps_when_only = false
    force_split = 0
}

master {
    new_is_master = false
    new_on_top = false
    mfact = 0.5
}

# -----------------------------------------------
# Misc
# -----------------------------------------------

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vfr = true
    enable_swallow = true
    swallow_regex = ^(wezterm)$
    focus_on_activate = true
    no_direct_scanout = false
    hide_cursor_on_touch = true
}

# -----------------------------------------------
# Group
# -----------------------------------------------

group {
    col.border_active = rgba(00b4d8ee)
    col.border_inactive = rgba(1a1a2eee)
    col.border_locked_active = rgba(ff0000ee)
    col.border_locked_inactive = rgba(1a1a2a55)
    group_toggle_border = true
    group_titles_border = true
    group_opacity = 1.0
    group_outline = true
}

# -----------------------------------------------
# Keybindings
# -----------------------------------------------

$mainMod = SUPER
$terminal = alacritty
$fileManager = dolphin
$menu = wofi --show drun

# Application launchers
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, firefox
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod, T, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

# Screenshot & Screen recording
bind = , Print, exec, grimblast copy area
bind = $mainMod, Print, exec, grimblast copy screen
bind = $mainMod SHIFT, Print, exec, grimblast copy active
bind = $mainMod CTRL, Print, exec, grimblast save area ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Focus movement (vim-style)
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows (vim-style)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Workspace scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Group management
bind = $mainMod, G, togglegroup
bind = $mainMod, tab, changegroupactive, f
bind = $mainMod SHIFT, tab, changegroupactive, b

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize with keyboard
bind = $mainMod CTRL, right, resizeactive, 30 0
bind = $mainMod CTRL, left, resizeactive, -30 0
bind = $mainMod CTRL, up, resizeactive, 0 -30
bind = $mainMod CTRL, down, resizeactive, 0 30

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = , XF86MonBrightnessUp, exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# -----------------------------------------------
# Window Rules
# -----------------------------------------------

# Float common utilities
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(thunar)$,title:^(File Operation Progress)$
windowrulev2 = float, class:^(thunar)$,title:^(Confirm to replace files)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, class:^(polkit-gnome-authentication-agent-1)$

# Set size for floaters
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = size 800 600, class:^(nm-connection-editor)$
windowrulev2 = size 800 600, class:^(blueman-manager)$

# Opacity rules
windowrulev2 = opacity 0.92 0.88, class:^(kitty)$
windowrulev2 = opacity 0.92 0.88, class:^(Alacritty)$
windowrulev2 = opacity 0.92 0.88, class:^(thunar)$

# Center on launch
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(nm-connection-editor)$
windowrulev2 = center, class:^(blueman-manager)$

# Maximize certain apps
windowrulev2 = fullscreen, class:^(firefox)$,title:^(Picture-in-Picture)$

# Suppress maximize
windowrulev2 = suppressevent maximize, class:.*

# -----------------------------------------------
# Layer Rules
# -----------------------------------------------

layerrule = blur, wlogout
layerrule = ignorezero, wlogout
layerrule = blur, notifications
layerrule = blur, swaync
layerrule = ignorezero, swaync
