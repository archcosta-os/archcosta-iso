# ArchCosta Hyprlock Configuration

general {
    grace = 5
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = /usr/share/archcosta/wallpapers/default.png
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(00b4d8)
    inner_color = rgb(1a1a2e)
    font_color = rgb(e0e0e0)
    fade_on_empty = true
    placeholder_text = <i>Enter Password...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(e0e0e0)
    font_size = 64
    font_family = Noto Sans Bold
    position = 0, 80
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi, $USER
    color = rgb(00b4d8)
    font_size = 20
    font_family = Noto Sans
    position = 0, 0
    halign = center
    valign = center
}
