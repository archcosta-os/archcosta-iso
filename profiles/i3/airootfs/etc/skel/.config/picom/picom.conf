# ArchCosta Picom Compositor Configuration

# ---------------------------------------------------------------------------
# Backend
# ---------------------------------------------------------------------------
backend = "glx";
vsync = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;

# ---------------------------------------------------------------------------
# Shadows
# ---------------------------------------------------------------------------
shadow = true;
shadow-radius = 12;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.35;
shadow-color = "#000000";

shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'i3-frame'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'"
];

# ---------------------------------------------------------------------------
# Fading
# ---------------------------------------------------------------------------
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;
no-fading-openclose = false;

fade-exclude = [];

# ---------------------------------------------------------------------------
# Opacity
# ---------------------------------------------------------------------------
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'Bar'",
    "class_g = 'slop'"
];

opacity-rule = [
    "92:class_g = 'Alacritty' && focused",
    "85:class_g = 'Alacritty' && !focused"
];

# ---------------------------------------------------------------------------
# Rounded Corners
# ---------------------------------------------------------------------------
corner-radius = 8;

rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'"
];

# ---------------------------------------------------------------------------
# Blur (optional, requires --experimental-backends or picom-git)
# ---------------------------------------------------------------------------
# blur-method = "dual_kawase";
# blur-size = 5;
# blur-strength = 3;
# blur-background = false;
# blur-background-frame = false;
# blur-background-fixed = false;

# blur-background-exclude = [
#     "window_type = 'dock'",
#     "window_type = 'desktop'",
#     "_GTK_FRAME_EXTENTS@:c"
# ];

# ---------------------------------------------------------------------------
# Animations (picom-git / picom-ftlabs only)
# ---------------------------------------------------------------------------
# animations = true;
# animation-stiffness = 200;
# animation-dampening = 25;
# animation-window-mass = 1;

# ---------------------------------------------------------------------------
# Window Type Settings
# ---------------------------------------------------------------------------
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
    dock = { shadow = false; clip-shadow-above = true; };
    dnd = { shadow = false; };
    popup_menu = { opacity = 0.95; shadow = true; };
    dropdown_menu = { opacity = 0.95; shadow = true; };
};
