# ArchCosta Foot Terminal Configuration

[main]
font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
pad=8x8
initial-window-size-chars=100x30

[bell]
urgent=yes
notify=yes

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}
protocols=http, https, ftp, ftps, file, gemini, gopher
uri-characters=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_.,~:;/?#@!$&%*+="'()[]

[cursor]
style=beam
blink=yes
beam-thickness=1.5

[mouse]
hide-when-typing=yes

[colors]
alpha=0.95
foreground=e0e0e0
background=1a1a2e

## Normal colors
regular0=1a1a2e  # black
regular1=ff6b6b  # red
regular2=51cf66  # green
regular3=ffd43b  # yellow
regular4=00b4d8  # blue
regular5=cc5de8  # magenta
regular6=22b8cf  # cyan
regular7=e0e0e0  # white

## Bright colors
bright0=2e2e4a   # bright black
bright1=ff8787   # bright red
bright2=69db7c   # bright green
bright3=ffe066   # bright yellow
bright4=22b8cf   # bright blue
bright5=da77f2   # bright magenta
bright6=3bc9db   # bright cyan
bright7=ffffff   # bright white

[key-bindings]
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
font-increase=Control+plus Control+equal
font-decrease=Control+minus
font-reset=Control+0
search-start=Control+Shift+f
spawn-terminal=Control+Shift+n
